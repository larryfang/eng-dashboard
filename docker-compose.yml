services:
  dashboard:
    build: .
    ports:
      - "9002:9002"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
