# =============================================================================
# Integrations
# =============================================================================

integrations:
  issue_tracker:
    provider: jira
    config: {}

  code_platform:
    provider: gitlab
    config:
      excluded_authors:
        - renovate-bot
        - dependabot
        - gitlab-ci

# =============================================================================
# Metrics Configuration
# =============================================================================

metrics:
  cache_ttl_hours: 24
  stale_epic_days: 7
  dora_targets:
    deploy_frequency_per_week: 15
    lead_time_hours: 24
    change_failure_rate: 0.05
    mttr_hours: 1

