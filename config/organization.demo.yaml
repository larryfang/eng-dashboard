organization:
  name: Nexus Technologies
  slug: nexus-tech
  description: Cloud platform & developer tools
  atlassian_cloud_id: "demo-cloud-id"
  atlassian_site_url: https://nexus-tech.atlassian.net
  jira_roadmap_url: ""

user:
  name: Morgan Hayes
